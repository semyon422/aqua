# Put these directives in the nginx http block.
limit_req_zone $binary_remote_addr zone=openai_proxy_rate:10m rate=60r/m;
limit_conn_zone $binary_remote_addr zone=openai_proxy_connections:10m;

server {
	listen 443 ssl http2;
	server_name ai.example.com;

	ssl_certificate /etc/letsencrypt/live/ai.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/ai.example.com/privkey.pem;

	client_max_body_size 1m;
	client_body_timeout 15s;
	client_header_timeout 15s;

	location /v1/ {
		limit_req zone=openai_proxy_rate burst=20 nodelay;
		limit_conn openai_proxy_connections 16;

		proxy_pass http://127.0.0.1:28081;
		proxy_http_version 1.1;
		proxy_set_header Host 127.0.0.1;
		proxy_set_header Connection "";
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto https;

		# Required for Chat Completions SSE streaming.
		proxy_buffering off;
		proxy_cache off;
		proxy_request_buffering on;
		proxy_read_timeout 310s;
		proxy_send_timeout 30s;
	}
}
